name: Nightly Deployer (LIVE SITE)

on:
  schedule:
    - cron: '37 6 * * *' # 🤖 Fires at 2:37 AM EDT (Beats the global server traffic jam)
  workflow_dispatch:

jobs:
  run-matrix-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Live Repository Code
      uses: actions/checkout@v4
      with:
        ref: main # 👈 FORCES THE BOT TO RUN ON YOUR LIVE MAIN BRANCH

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Execute High-Precision Matrix Engine
      run: python engine.py

    - name: Commit and Push Generated Live Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add MyLax_Rankings.json site_metadata.json rankings_history.json
        git commit -m "🤖 Live Matrix Engine Auto-Update" || echo "No data updates detected."
        git push origin main
